<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DataScience Encryptor - Web Demo</title>
    <meta name="description" content="An interactive web interface demonstrating the DataScience Encryptor CLI core functionality.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-container">
        <!-- Floating Animated Background Entities -->
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>

        <main class="dashboard-card">
            <header class="dashboard-header">
                <div class="logo-container">
                    <svg class="lock-icon" xmlns="http://www.w3.org/2001/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                        <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                    </svg>
                    <div>
                        <h1>DataScience <span>Encryptor</span></h1>
                        <p>Enterprise-Grade CLI Tool Interface</p>
                    </div>
                </div>
                <div class="status-badge">
                    <span class="pulse"></span> Secure Connection
                </div>
            </header>

            <div class="dashboard-content">
                <div class="input-section">
                    <div class="form-group">
                        <label for="plaintext">Input Text to Encrypt</label>
                        <textarea id="plaintext" placeholder="Enter highly classified data here..." rows="4"></textarea>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="algorithm">Algorithm Selection</label>
                            <div class="select-wrapper">
                                <select id="algorithm">
                                    <option value="AES-256">PBEWITHHMACSHA512ANDAES_256 (Recommended)</option>
                                    <option value="DES">PBEWithMD5AndDES (Legacy)</option>
                                    <option value="DESede">PBEWithSHA1AndDESede (Legacy)</option>
                                    <option value="RC2">PBEWithSHA1AndRC2_40 (Legacy)</option>
                                </select>
                                <svg class="chevron" xmlns="http://www.w3.org/2001/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>
                            </div>
                        </div>

                        <div class="form-group">
                            <label for="secret-key">Secret Key</label>
                            <div class="input-wrapper">
                                <svg class="key-icon" xmlns="http://www.w3.org/2001/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"></path></svg>
                                <input type="password" id="secret-key" placeholder="Enter secure passphrase">
                                <button type="button" id="toggle-password" class="icon-button" aria-label="Toggle password visibility">
                                    <svg class="eye-icon" xmlns="http://www.w3.org/2001/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                                </button>
                            </div>
                        </div>
                    </div>

                    <button id="encrypt-btn" class="primary-btn">
                        <svg class="zap-icon" xmlns="http://www.w3.org/2001/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon></svg>
                        Execute Encryption
                    </button>
                    <p class="architecture-warning">
                        <svg xmlns="http://www.w3.org/2001/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>
                        Encryptor-Only Architecture. Decryption is physically decoupled.
                    </p>
                </div>

                <div class="terminal-section">
                    <div class="terminal-header">
                        <div class="terminal-controls">
                            <span class="control red"></span>
                            <span class="control yellow"></span>
                            <span class="control green"></span>
                        </div>
                        <span class="terminal-title">bash - java -jar ds-encryptor-1.0.0.jar</span>
                        <div class="terminal-actions">
                            <button id="copy-btn" class="icon-button" aria-label="Copy to clipboard" title="Copy output">
                                <svg xmlns="http://www.w3.org/2001/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                            </button>
                        </div>
                    </div>
                    <div class="terminal-body" id="console">
                        <div class="console-line text-muted">Initialize the application to generate encrypted payload...</div>
                    </div>
                </div>
            </div>
        </main>
        
        <footer class="app-footer">
            <a href="https://github.com/MustafaGamal000/datascience-encryptor" target="_blank" class="github-link">
                <svg xmlns="http://www.w3.org/2001/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"></path></svg>
                View CLI Source Code on GitHub
            </a>
        </footer>
    </div>

    <!-- CryptoJS for secure browser-side encryption demo (AES) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
